<html>
  <head>
    <meta charset="utf-8">
    <title>Hội Phục hưng Việt Nam Tự do</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/vfra.png">
    <style>
      body {
        margin: 0;
        height: 100vh;
        width: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(255, 0, 255);
        color: rgb(255, 255, 0);
      }
      .container {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 10px;
        font-size: 28px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div><h1 style="text-align: center">Tự do đang đến. Hãy chờ đợi...</h1></div>
      <div id="clock"></div>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const utc7 = new Date(utc + (7 * 60 * 60 * 1000));

        const year = utc7.getFullYear();
        const month = String(utc7.getMonth() + 1).padStart(2, "0");
        const day = String(utc7.getDate()).padStart(2, "0");
        const hours = String(utc7.getHours()).padStart(2, "0");
        const minutes = String(utc7.getMinutes()).padStart(2, "0");
        const seconds = String(utc7.getSeconds()).padStart(2, "0");

        document.getElementById("clock").textContent =
          `${year}.${month}.${day} ${hours}:${minutes}:${seconds} (UTC+7)`;
      }

      setInterval(updateClock, 1000);
      updateClock();
    </script>
  </body>
</html>
