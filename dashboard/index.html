<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/vfra.png">
    <title>Hội Việt Nam Tự do</title>
    <style>
      body{
        margin:0;
        background:#9c4ca0;
        font-family: serif;
      }
      .header{
        height:75px;
        background:#9c4ca0;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 25px;
        border-bottom:5px solid blue;
      }
      .left-header{
        display:flex;
        align-items:center;
        gap:25px;
      }
      .circle{
        width:50px;
        height:50px;
        border-radius:50%;
      }
      .red{ background:red; }
      .yellow{ background:yellow; }
      .logo{
        font-size:25px;
        color:yellow;
        font-weight:bold;
      }
      .green{
        background:green;
      }
      .container{
        display:flex;
        gap:25px;
        padding:25px;     
      }
      .box{
        background-color: blue;
        padding:25px;
        color:yellow;
        font-size:25px;
        display:flex;            
        justify-content:center; 
        align-items:center;   
        text-align:center; 
      }
      .column{
        display:flex;
        flex-direction:column;
        gap:25px;
      }
      .big{
        height:425px;
        width:250px;
      }
      .medium{
        height:175px;
        width:250px;
      }
      .tiny{
        height:50px;
        width:250px;
      }
      .language-box{
        position:relative;
        cursor:pointer;
      }
      .language-list{
        display:none;
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        background:blue;
        border-top:5px solid yellow;
        flex-direction:column;
        z-index: 999;
      }
      .language-list a{
        color:yellow;
        text-decoration:none;
        padding:10px;
        border-bottom:5px solid yellow;
        display:block;
      }
      .language-list a:hover{
        background:yellow;
        color:blue;
      }
      </style>
    </head>
  <body>
    <div class="header">
      <div class="left-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="logo">HỘI VIỆT NAM TỰ DO</div>
      </div>
      <div class="circle green"></div>
    </div>
    <div class="container">
      <div class="box big">DIỄN ĐÀN</div>
      <div class="box big">TRÒ CHUYỆN</div>
      <div class="column">
        <div class="box medium">CHÍNH SỬ</div>
        <div class="box medium">TIN TỨC</div>
      </div>
      <div class="column">
        <div class="box tiny language-box" onclick="toggleLanguage()">
          NGÔN NGỮ
          <div class="language-list" id="languageList">
            <a onclick="changeLang('vietnam'); return false;">Tiếng Việt</a>
            <a onclick="changeLang('iran'); return false;">فارسی</a>
          </div>
        </div>
        <div class="box tiny">DISCORD</div>
        <div class="box tiny">X</div>
        <div class="box tiny">REDDIT</div>
      </div>
    </div>
    <script>
      function toggleLanguage(){
        const list = document.getElementById("languageList");
        list.style.display =
          list.style.display === "flex" ? "none" : "flex";
      }
      function changeLang(lang){
        const path = window.location.pathname;
        const parts = path.split("/").filter(Boolean);
        if(parts.length >= 2){
          parts[0] = lang;  
      }
      const newPath = "/" + parts.join("/");
        window.location.href = newPath;
      }
    </script>
  </body>
</html>
