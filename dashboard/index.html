<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon/vfra.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">

  <title>Hội Việt Nam Tự do</title>
</head>
<body>

  <div id="langOverlay" class="lang-overlay"></div>

  <div class="header">
    <div class="left-header">
      <div class="circle red"></div>
      <div class="circle yellow"></div>
      <div class="logo">HỘI VIỆT NAM TỰ DO</div>
    </div>
    <div class="circle green"></div>
  </div>

  <div class="container">

    <div class="box big">DIỄN ĐÀN</div>
    <div class="box big">TRÒ CHUYỆN</div>

    <div class="column">
      <div class="box medium">CHÍNH SỬ</div>
      <div class="box medium">TIN TỨC</div>
    </div>

    <div class="column">
      <div class="box tiny language-box">
        NGÔN NGỮ
        <div class="language-list" id="languageList">
          <a>Tiếng Việt</a>
          <a>فارسی</a>
        </div>
      </div>
      <div class="box tiny">DISCORD</div>
      <div class="box tiny">X</div>
      <div class="box tiny" id="redditBtn">REDDIT</div>
    </div>

  </div>

  <!-- Reddit Modal -->
  <div id="redditModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h1>Hội Việt Nam Tự do không tồn tại trên Reddit như một subreddit riêng.</h1>
      <p>Thay vào đó, các thành viên hoạt động trong:</p>
      <a href="https://www.reddit.com/r/TroChuyenLinhTinh/" target="_blank">TroChuyenLinhTinh</a><br/><br/>
      <a href="https://www.reddit.com/r/VietNamNation/" target="_blank">Vietnam Nation - Đất nước Việt Nam</a>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
